name: Sync API types from backend

# Thin caller —— 實際邏輯在 s930415/be2fe-actions（reusable workflow）。
on:
  repository_dispatch:
    types: [backend-api-updated]
  workflow_dispatch:
    inputs:
      sha:
        description: 要同步的後端 commit SHA（預設 main）
        required: false
        default: main

jobs:
  sync:
    permissions:
      contents: write
      pull-requests: write
    uses: s930415/be2fe-actions/.github/workflows/fe-sync-api.yml@v1
    with:
      backend-repo: s930415/api-be-test
