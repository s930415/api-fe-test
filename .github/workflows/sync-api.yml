name: Sync API types from backend

# Thin caller —— 實際邏輯在 s930415/be2fe-actions（reusable workflow）。
on:
  repository_dispatch:
    types: [backend-api-updated]
  workflow_dispatch:
    inputs:
      sha:
        description: 要同步的後端 commit SHA（預設 main）
        required: false
        default: main
      target-branch:
        description: 目標前端分支（ad-hoc 用；留空預設 main）
        required: false
        default: ''

jobs:
  sync:
    permissions:
      contents: write
      pull-requests: write
    uses: s930415/be2fe-actions/.github/workflows/fe-sync-api.yml@v2
    with:
      backend-repo: s930415/api-be-test
      # 同名分支自動成立;命名不同 / 某支 feature 盯特定後端分支才寫 subscribe:
      subscribe: '{"feature/exp": "dev"}'
