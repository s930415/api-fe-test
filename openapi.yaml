openapi: 3.0.1
info:
  title: api-be-test
  description: POC 後端 (Spring Boot + springdoc 自動產生合約)
  version: 1.0.0
servers:
- url: http://localhost:8080
  description: local
paths:
  /products:
    get:
      tags:
      - product-controller
      summary: 取得商品列表
      operationId: listProducts
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
  /health:
    get:
      tags:
      - health-controller
      summary: 健康檢查
      operationId: getHealth
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Health"
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          description: 商品 ID
          format: int64
          example: 1
        name:
          type: string
          description: 商品名稱
          example: Coffee
        price:
          type: number
          description: 價格
          format: double
          example: 4.5
        stock:
          type: integer
          description: 庫存數量
          format: int32
          example: 100
        category:
          type: string
          description: 商品分類
          example: drinks
        sku:
          type: string
          description: 商品貨號
          example: SKU-001
        supplier:
          type: string
          description: 供應商
          example: ACME
    Health:
      type: object
      properties:
        status:
          type: string
          description: 服務狀態
          example: ok
